<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors Game</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1 class="app-title">Rock Paper Scissors</h1>

    <!-- Weapon Selection -->
    <div class="weapon-box">

        <h3>Select Your Weapon</h3>

        <div class="weapons">

            <div class="weapon Rock">
                <img src="Images/Rock.png" alt="Rock">
            </div>

            <div class="weapon Paper">
                <img src="Images/Paper.png" alt="Paper">
            </div>

            <div class="weapon Scissors">
                <img src="Images/Scissors.png" alt="Scissors">
            </div>

        </div>

    </div>

    <!-- Player Choices -->
    <div class="player-choices">

        <h3>
            <span>Player</span>
            <span>VS</span>
            <span>Computer</span>
        </h3>

        <div class="choice-box">

            <div class="player-choice">
                <img src="Images/Rock.png" alt="Player">
            </div>

            <div class="computer-choice">
                <img src="Images/Rock.png" alt="Computer">
            </div>

        </div>

    </div>

    <!-- Result -->
    <div class="result-box">

        <h2 class="result-text">You Won 🎉</h2>

        <button class="play-again">
            ↻ Play Again
        </button>

    </div>

    <!-- Score -->
    <div class="score-box">

        <div>
            Won
            <span class="won">0</span>
        </div>

        <div>
            Lost
            <span class="lost">0</span>
        </div>

        <div>
            Draw
            <span class="draw">0</span>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
